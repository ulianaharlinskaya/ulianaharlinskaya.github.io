<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ульяна Харлинская | UX/UI Designer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           CSS ВАРИАБЛЫ & НАСТРОЙКИ
           ========================================================================== */
        :root {
            --bg-color: #EFF1F6; 
            --text-main: #282828;
            --text-muted: #555555;
            --border-color: #d1d1d1;
            /* Мобильный радиус скруглений по умолчанию */
            --radius: 16px;
        }

        /* Десктопный радиус скруглений */
        @media (min-width: 768px) {
            :root {
                --radius: 30px;
            }
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-main); 
            line-height: 1.4; 
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body * { 
            box-sizing: border-box; 
        }

        body.modal-open { overflow: hidden; }

        .app-container { width: 100%; max-width: 1048px; margin: 0 auto; padding: 0 16px; }
        @media (min-width: 768px) { .app-container { padding: 0 24px; } }

        h1, h2, h3, h4 { 
            font-weight: 700; 
            line-height: 1.1; 
            letter-spacing: -0.04em; 
            margin: 0;
        }

        /* Мобильный размер заголовка секции */
        .section-title {
            font-size: 1.4rem; margin-bottom: 1.5rem; letter-spacing: -1px;
            border-bottom: 2px solid var(--text-main); padding-bottom: 0.5rem; display: inline-block;
        }
        @media (min-width: 768px) { .section-title { font-size: 2.5rem; margin-bottom: 2rem; } }

        /* АНИМАЦИИ */
        @keyframes appFadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-tab {
            animation: appFadeInUp 0.4s ease-out forwards;
        }

        .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }

        /* HEADER */
        .main-header {
            padding: 16px 0; background: rgba(239, 241, 246, 0.85); backdrop-filter: blur(12px);
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100; border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        
        /* Мобильный размер логотипа */
        .app-logo { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.5px; text-decoration: none; color: var(--text-main); cursor: pointer; }
        
        .header-nav { display: flex; gap: 16px; }
        .header-nav a { color: var(--text-main); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: color 0.3s ease; cursor: pointer; }
        .header-nav a:hover { color: var(--text-muted); }

        @media (min-width: 768px) {
            .main-header { padding: 24px 0; }
            .app-logo { font-size: 1.2rem; }
            .header-nav { gap: 24px; }
            .header-nav a { font-size: 0.95rem; }
        }

        /* HERO */
        #hero { padding: 120px 0 30px; }
        
        /* Мобильное расположение: колонка, фото сверху */
        .hero-top-row {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 20px;
        }
        @media (min-width: 768px) { 
            #hero { padding: 160px 0 50px; }
            .hero-top-row { flex-direction: row; align-items: center; gap: 32px; margin-bottom: 40px; }
        }

        .hero-image-placeholder { width: 92px; height: 92px; border-radius: var(--radius); background-color: #d1d1d1; flex-shrink: 0; margin: 0; }
        @media (min-width: 768px) { .hero-image-placeholder { width: 140px; height: 140px; } }

        /* Мобильный размер заголовка и растягивание на всю ширину */
        .hero-main-text { font-size: 1.65rem; letter-spacing: -1px; margin: 0; font-weight: 700; text-wrap: wrap; width: 100%; }
        @media (min-width: 768px) { 
            .hero-main-text { font-size: 28px; letter-spacing: -1px; width: auto; } 
        }
        @media (min-width: 1024px) { .hero-main-text { font-size: 38px; letter-spacing: -1.2px; } }
        
        .hero-intro { display: flex; flex-direction: row; flex-wrap: wrap; align-items: flex-start; gap: 16px; width: 100%; }
        @media (min-width: 768px) { .hero-intro { gap: 40px; flex-wrap: nowrap; } }
        
        .hero-text-block { display: contents; }
        @media (min-width: 768px) { .hero-text-block { display: block; flex: 1; } }
        
        /* Мобильный размер описания под заголовком */
        .hero-text-block p { margin-top: 0; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; width: 100%; line-height: 1.6; }
        @media (min-width: 768px) { .hero-text-block p { font-size: 1.15rem; margin-bottom: 24px; } }
        
        .btn-primary {
            display: inline-flex; align-items: center; justify-content: center; padding: 14px 32px; 
            background: var(--text-main); border: 1px solid var(--text-main); width: 100%;
            color: #fff; text-decoration: none; font-weight: 500; border-radius: 50px; 
            transition: all 0.3s ease; cursor: pointer;
        }
        @media (min-width: 768px) { .btn-primary { width: auto; } }
        .btn-primary:hover { background: transparent; color: var(--text-main); }

        /* PORTFOLIO */
        #works { padding: 30px 0 60px; scroll-margin-top: 90px; }
        @media (min-width: 768px) { #works { padding: 40px 0 80px; } }
